version: "3.9"

# Local development stack for the Modern Data Lakehouse
# Usage: docker compose up -d
# Stop:  docker compose down -v

networks:
  lakehouse:
    driver: bridge

volumes:
  minio_data:
  kafka_data:
  zookeeper_data:
  postgres_data:
  jupyter_work:

services:
  # ── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: lakehouse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MinIO bucket init ──────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-05-24T09-08-49Z
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - lakehouse
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/lakehouse-bronze;
        mc mb --ignore-existing local/lakehouse-silver;
        mc mb --ignore-existing local/lakehouse-gold;
        mc mb --ignore-existing local/checkpoints;
        echo 'Buckets ready.'
      "

  # ── Zookeeper (Kafka dependency) ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: lakehouse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: lakehouse-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # Host-accessible bootstrap
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG4J_LOGGERS: "kafka.controller=WARN,kafka.log.LogCleaner=WARN"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 15s
      retries: 5

  # ── Kafka UI ──────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: lakehouse-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"   # → http://localhost:8090
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - lakehouse

  # ── Kafka topic init ──────────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: lakehouse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - lakehouse
    entrypoint: >
      /bin/sh -c "
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.events --partitions 4 --replication-factor 1;
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.orders --partitions 4 --replication-factor 1;
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic cdc.customers --partitions 4 --replication-factor 1;
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic cdc.orders --partitions 4 --replication-factor 1;
        echo 'Topics ready.'
      "

  # ── PostgreSQL (source DB for CDC) ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lakehouse-postgres
    environment:
      POSTGRES_DB: lakehouse_source
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Enable logical replication for Debezium CDC
      POSTGRES_HOST_AUTH_METHOD: trust
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spark (standalone for local Delta/Iceberg dev) ─────────────────────────
  spark-master:
    image: bitnami/spark:3.5.1
    container_name: lakehouse-spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_OPTS: >-
        -Dspark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
        -Dspark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
    ports:
      - "7077:7077"   # Spark master
      - "8081:8080"   # Spark UI → http://localhost:8081
    networks:
      - lakehouse

  spark-worker:
    image: bitnami/spark:3.5.1
    container_name: lakehouse-spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    networks:
      - lakehouse

  # ── JupyterLab ────────────────────────────────────────────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: lakehouse-jupyter
    depends_on:
      - spark-master
      - minio
    ports:
      - "8888:8888"   # → http://localhost:8888 (token: lakehouse)
    environment:
      JUPYTER_TOKEN: lakehouse
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_ENDPOINT_URL: http://minio:9000
      SPARK_MASTER: spark://spark-master:7077
    volumes:
      - jupyter_work:/home/jovyan/work
      - .:/home/jovyan/work/repo:ro
    networks:
      - lakehouse

  # ── FastAPI semantic search ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: lakehouse-api
    ports:
      - "8080:8080"   # → http://localhost:8080/docs
    environment:
      GCP_PROJECT: local-dev
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
    volumes:
      - ./credentials.json:/app/credentials.json:ro
    networks:
      - lakehouse
    profiles:
      - api   # only start with: docker compose --profile api up
